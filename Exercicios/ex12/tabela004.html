<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
            width: 300px;
        }

        caption {
            font-size: 1.3em;
            font-weight: bold;
        }

        th, td {
            border: 1px solid black;
            padding: 20px;
        }
    </style>
</head>
<body>
    <h1>Exercicios de tabelas</h1>

    <table>
        <caption>Filmes favoritos</caption>

        <thead>
            <tr>
                <th scope="col">Grupo</th>
                <th scope="col">Nomes</th>
                <th colspan="3" scope="colgroup">Filmes</th>
            </tr>
        </thead>
        
        <tbody>
            <tr>
                <th rowspan="3" scope="rowgroup">Mulheres</th>
                <td>Ana maria santos</td>
                <td>alien</td>
                <td>rambo</td>
                <td>vingadores</td>
            </tr>

            <tr>
                <td>Beatriz souza</td>
                <td>homem aranha</td>
                <td>hulk</td>
                <td>luz</td>
            </tr>

            <tr>
                <td>Joana dos santos</td>
                <td>estelar</td>
                <td>matrix</td>
                <td>bighero</td>
            </tr>

            <tr>
                <th rowspan="3" scope="rowgroup">Homens</th>
                <td>Bruno Henrique</td>
                <td>intocavei</td>
                <td>amnesia</td>
                <td>gladiadores</td>
            </tr>

            <tr>
                <td>Pedro Joao</td>
                <td>Flash</td>
                <td>batman</td>
                <td>jogos vorazes</td>
            </tr>

            <tr>
                <td>Daniel</td>
                <td>wale</td>
                <td>star</td>
                <td>driver</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
